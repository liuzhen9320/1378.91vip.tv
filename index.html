<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>访问验证</title>
  <link rel="icon" type="image/png" href="https://umm.932.moe/p/kPQZbFk4J" />
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: sans-serif;
    }
    main {
      width: 280px;
      padding: 16px;
      border: 1px solid #ddd;
      border-radius: 8px;
      background: #fff;
    }
    h1 {
      margin: 0 0 12px;
      font-size: 18px;
      text-align: center;
    }
    form {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    input,
    button {
      height: 36px;
      padding: 0 10px;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 14px;
    }
    button {
      cursor: pointer;
      background: #f5f5f5;
    }
  </style>
</head>
<body>
  <main>
    <h1>访问验证</h1>
    <form id="gateForm">
      <input id="gatePassword" type="password" placeholder="请输入密码" autocomplete="off" />
      <button type="submit">~❤️ 立即进入 ❤️~</button>
    </form>
  </main>
  <script>
    document.getElementById("gateForm").addEventListener("submit", (event) => {
      event.preventDefault();
      if (document.getElementById("gatePassword").value === "91vip") {
        location.href = "home.html";
        return;
      }
      alert("密码错误，请重试");
      document.getElementById("gatePassword").select();
    });
  </script>
</body>
</html>
